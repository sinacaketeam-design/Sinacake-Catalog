<body class="bg-pink-50">

                </div>

                    <span>ADMIN</span>
                </div>
                
                <button onclick="showBranchModal()" 
                        class="bg-gradient-to-r from-emerald-500 to-teal-500 text-white px-4 py-2.5 rounded-2xl text-sm font-bold flex items-center gap-2 shadow-lg active:scale-95 transition-transform">
                    <i class="fab fa-whatsapp text-lg"></i> 
                    <span class="hidden sm:inline">Hubungi</span>
                </button>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="p-4 bg-white sticky top-[73px] z-40 border-b border-pink-100">
            <div class="relative">
                <input id="search-input" type="text" placeholder="Cari kue impianmu..." 
                       class="w-full pl-12 pr-4 py-3.5 border border-pink-200 rounded-3xl focus:outline-none focus:border-pink-400 focus:ring-1 focus:ring-pink-200 text-sm"
                       onkeyup="handleSearch(this.value)">
                <i class="fas fa-search absolute left-5 top-4 text-pink-300"></i>

        </div>

        <!-- Main Content -->
        <div id="main-content" class="p-4 pb-24 min-h-[calc(100vh-200px)] cake-bg"></div>

        <!-- Bottom Navigation -->

                    class="flex-1 py-3.5 bg-pink-100 hover:bg-pink-200 active:bg-pink-300 text-pink-600 rounded-2xl font-bold flex items-center justify-center gap-2 transition-colors">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            
            <button onclick="showBranchModal()" 
                    class="flex-1 py-3.5 bg-gradient-to-r from-emerald-500 to-teal-500 text-white rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-[0.985] transition-all">
                <i class="fab fa-whatsapp text-xl"></i>
                <span>WhatsApp</span>
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed bottom-20 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-2xl text-sm font-medium shadow-2xl z-[100]">
        <div class="flex items-center gap-2">
            <i class="fas fa-check-circle text-emerald-400"></i>
            <span id="toast-text"></span>
        </div>
    </div>

    <script>
        // ==================== GLOBAL VARIABLES ====================
        let catalogs = [];
        let products = [];
        let isAdminMode = false;
        let currentCatalogId = null;
        let searchQuery = '';
        let currentProduct = null;
        let headerClickCount = 0;
        let lastHeaderClickTime = 0;
        let db = null;

        const DB_NAME = 'SinacakeDB';
        const DB_VERSION = 1;

        // ==================== INDEXEDDB ====================
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    
                    if (!database.objectStoreNames.contains('catalogs')) {
                        database.createObjectStore('catalogs', { keyPath: 'id' });
                    }
                    
                    if (!database.objectStoreNames.contains('products')) {
                        database.createObjectStore('products', { keyPath: 'id' });
                    }
                };
                
                request.onsuccess = (event) => {
                    db = event.target.result;
                    resolve(db);
                };
                
                request.onerror = (event) => {
                    console.error('IndexedDB error:', event.target.error);
                    reject(event.target.error);
                };
            });
        }

        async function ensureDB() {
            if (!db) {
                await openDB();
            }
            return db;
        }

        async function getAllFromStore(storeName) {
            await ensureDB();
            return new Promise((resolve) => {
                const transaction = db.transaction(storeName, 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.getAll();
                
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => resolve([]);
            });
        }

        async function saveToStore(storeName, data) {
            await ensureDB();
            return new Promise((resolve) => {
                const transaction = db.transaction(storeName, 'readwrite');
                const store = transaction.objectStore(storeName);
                
                store.clear().onsuccess = () => {
                    if (data.length === 0) {
                        resolve(true);
                        return;
                    }
                    
                    let completed = 0;
                    data.forEach(item => {
                        const req = store.put(item);
                        req.onsuccess = () => {
                            completed++;
                            if (completed === data.length) resolve(true);
                        };
                    });
                };
            });
        }

        async function addToStore(storeName, item) {
            await ensureDB();
            return new Promise((resolve) => {
                const transaction = db.transaction(storeName, 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.put(item);
                request.onsuccess = () => resolve(true);
                request.onerror = () => resolve(false);
            });
        }

        async function deleteFromStore(storeName, id) {
            await ensureDB();
            return new Promise((resolve) => {
                const transaction = db.transaction(storeName, 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.delete(id);
                request.onsuccess = () => resolve(true);
                request.onerror = () => resolve(false);
            });
        }

        // ==================== DATA MANAGEMENT ====================
        function seedInitialData() {
            catalogs = [
                { id: "c1", name: "Anak-anak", icon: "fa-baby" },
                { id: "c2", name: "Dewasa", icon: "fa-user" },
                { id: "c3", name: "Umum", icon: "fa-users" },
                { id: "c4", name: "Flower Cake", icon: "fa-spa" },
                { id: "c5", name: "Persegi / Kotak", icon: "fa-square" },
                { id: "c6", name: "Wedding", icon: "fa-heart" },
                { id: "c7", name: "Cake Religi", icon: "fa-church" },
                { id: "c8", name: "Chinese Theme", icon: "fa-dragon" },
                { id: "c9", name: "Adult 18+", icon: "fa-user-secret" }
            ];
            
            products = [
                { 
                    id: "p4", 
                    catalogId: "c4", 
                    name: "Flower Garden Cake", 
                    image: "https://picsum.photos/id/1011/600/600", 
                    keywords: ["flower", "garden", "pink", "elegan"] 
                },
                { 
                    id: "p5", 
                    catalogId: "c6", 
                    name: "Classic Wedding Cake", 
                    image: "https://picsum.photos/id/106/600/600", 
                    keywords: ["wedding", "putih", "elegan", "klasik"] 
                },
                { 
                    id: "p6", 
                    catalogId: "c7", 
                    name: "Cake Religi Halal", 
                    image: "https://picsum.photos/id/292/600/600", 
                    keywords: ["halal", "religi", "islam", "hijau"] 
                },
                { 
                    id: "p7", 
                    catalogId: "c8", 
                    name: "Chinese Dragon Cake", 
                    image: "https://picsum.photos/id/201/600/600", 
                    keywords: ["dragon", "chinese", "red", "imlek"] 
                },
                { 
                    id: "p8", 
                    catalogId: "c9", 
                    name: "Red Velvet Adult", 
                    image: "https://picsum.photos/id/1005/600/600", 
                    keywords: ["redvelvet", "18+", "dewasa", "sexy"] 
                },
                { 
                    id: "p9", 
                    catalogId: "c6", 
                    name: "Rustic Wedding Cake", 
                    image: "https://picsum.photos/id/160/600/600", 
                    keywords: ["rustic", "wedding", "natural", "boho"] 
                }
            ];
        }

        async function migrateFromOldLocalStorage() {
            try {
                const oldCatalogs = localStorage.getItem('sinacake_catalogs');
                const oldProducts = localStorage.getItem('sinacake_products');
                
                if (oldCatalogs) {
                    const parsedCatalogs = JSON.parse(oldCatalogs);
                    const parsedProducts = oldProducts ? JSON.parse(oldProducts) : [];
                    
                    if (parsedCatalogs.length > 0) {
                        catalogs = parsedCatalogs;
                        products = parsedProducts;
                        
                        await saveToStore('catalogs', catalogs);
                        await saveToStore('products', products);
                        
                        localStorage.removeItem('sinacake_catalogs');
                        localStorage.removeItem('sinacake_products');
                        
                        showToast('Data lama berhasil dipindahkan ke penyimpanan baru!');
                        return true;
                    }
                }
            } catch (e) {
                console.log('No old data to migrate or error:', e);
            }
            return false;
        }

        async function loadData() {
            try {
                await ensureDB();
                
                const migrated = await migrateFromOldLocalStorage();
                
                if (!migrated) {
                    const savedCatalogs = await getAllFromStore('catalogs');
                    const savedProducts = await getAllFromStore('products');
                    
                    if (savedCatalogs.length > 0) {
                        catalogs = savedCatalogs;
                    }
                    if (savedProducts.length > 0) {
                        products = savedProducts;
                    }
                }
                
                if (catalogs.length === 0) {
                    seedInitialData();
                    await saveData();
                    showToast('Data contoh berhasil dimuat');
                }
            } catch (e) {
                console.error('Error loading data:', e);
                seedInitialData();
            }
        }

        async function saveData() {
            try {
                await saveToStore('catalogs', catalogs);
                await saveToStore('products', products);
            } catch (e) {
                console.error('Error saving data:', e);
            }
        }

        async function addCatalog(newCatalog) {
            catalogs.push(newCatalog);
            await addToStore('catalogs', newCatalog);
            render();
        }

        async function addProduct(newProduct) {
            products.push(newProduct);
            await addToStore('products', newProduct);
            render();
        }

        async function updateProduct(id, updates) {
            const index = products.findIndex(p => p.id === id);
            if (index !== -1) {
                products[index] = { ...products[index], ...updates };
                await addToStore('products', products[index]);
                render();
            }
        }

        async function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            await deleteFromStore('products', id);
            render();
        }

        async function confirmDeleteAllProducts() {
            if (!currentCatalogId) return;
            
            const cat = catalogs.find(c => c.id === currentCatalogId);
            const count = products.filter(p => p.catalogId === currentCatalogId).length;
            
            if (count === 0) {
                alert('Tidak ada produk di kategori ini.');
                return;
            }
            
            if (!confirm(`Yakin ingin menghapus SEMUA ${count} produk di kategori "${cat.name}"?\n\nTindakan ini tidak bisa dibatalkan.`)) {
                return;
            }
            
            // Hapus semua produk di kategori ini
            const toDelete = products.filter(p => p.catalogId === currentCatalogId);
            for (const prod of toDelete) {
                await deleteFromStore('products', prod.id);
            }
            
            products = products.filter(p => p.catalogId !== currentCatalogId);
            showToast(`${count} produk berhasil dihapus dari kategori "${cat.name}"`);
            render();
        }

        async function updateCatalog(id, updates) {
            const index = catalogs.findIndex(c => c.id === id);
            if (index !== -1) {
                catalogs[index] = { ...catalogs[index], ...updates };
                await addToStore('catalogs', catalogs[index]);
                render();
            }
        }

        async function deleteCatalog(id) {
            const productsToDelete = products.filter(p => p.catalogId === id);
            for (const prod of productsToDelete) {
                await deleteFromStore('products', prod.id);
            }
            products = products.filter(p => p.catalogId !== id);
            
            catalogs = catalogs.filter(c => c.id !== id);
            await deleteFromStore('catalogs', id);
            render();
        }

        // ==================== RENDER FUNCTIONS ====================
        function render() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            if (searchQuery) {
                renderSearchResults(container);
            } else if (currentCatalogId) {
                renderCatalogProducts(container);
            } else {
                renderHomeCatalogs(container);
            }
        }

        function renderHomeCatalogs(container) {
            let html = `
                <div class="mb-4 flex items-center justify-between px-1">
                    <div>
                        <h2 class="text-2xl font-extrabold text-gray-800">Kategori Kue</h2>
                        <p class="text-sm text-pink-500">Pilih kategori favoritmu</p>
                    </div>
                    ${isAdminMode ? `
                        <button onclick="showAddCatalogModal()" 
                                class="flex items-center gap-2 bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-2xl text-sm font-bold shadow-lg active:scale-95 transition-all">
                            <i class="fas fa-plus"></i>
                            <span>Tambah</span>
                        </button>
                    ` : ''}
                </div>
                
                <div class="grid grid-cols-2 gap-3">
            `;
            
            catalogs.forEach(cat => {
                const count = products.filter(p => p.catalogId === cat.id).length;
                html += `
                    <div onclick="openCatalog('${cat.id}')" 
                         class="catalog-card bg-white border border-pink-100 rounded-3xl p-4 cursor-pointer hover:border-pink-200 group">
                        <div class="flex items-start justify-between">
                            <div class="w-12 h-12 bg-pink-100 rounded-2xl flex items-center justify-center group-hover:bg-pink-200 transition-colors">
                                <i class="fas ${cat.icon} text-pink-500 text-2xl"></i>
                            </div>
                            
                            ${isAdminMode ? `
                                <div class="flex gap-1">
                                    <button onclick="event.stopImmediatePropagation(); showEditCatalogModal('${cat.id}')" 
                                            class="w-8 h-8 flex items-center justify-center text-pink-400 hover:text-pink-600 hover:bg-pink-50 rounded-xl">
                                        <i class="fas fa-edit text-xs"></i>
                                    </button>
                                    <button onclick="event.stopImmediatePropagation(); confirmDeleteCatalog('${cat.id}')" 
                                            class="w-8 h-8 flex items-center justify-center text-red-400 hover:text-red-600 hover:bg-red-50 rounded-xl">
                                        <i class="fas fa-trash text-xs"></i>
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="mt-4">
                            <div class="font-bold text-lg text-gray-800">${cat.name}</div>
                            <div class="text-xs text-pink-400 mt-0.5">${count} produk</div>
                        </div>
                    </div>
                `;
            });
            
            html += `</div>`;
            
            // Always show Import on main page (no login required)
            html += `
                <div class="mt-6 flex gap-2">
                    <button onclick="importData()" 
                            class="flex-1 py-3 text-sm bg-white border-2 border-dashed border-pink-300 hover:border-pink-400 active:bg-pink-50 text-pink-600 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all">
                        <i class="fas fa-file-import"></i> 
                        <span>Import Backup JSON</span>
                    </button>
                    ${isAdminMode ? `
                        <button onclick="exportData()" 
                                class="flex-1 py-3 text-sm bg-emerald-50 border border-emerald-200 text-emerald-600 rounded-2xl font-bold flex items-center justify-center gap-2">
                            <i class="fas fa-download"></i> 
                            <span>Export</span>
                        </button>
                    ` : ''}
                </div>
            `;
            
            if (isAdminMode) {
                html += `
                    <div class="mt-3 p-4 bg-emerald-50 border border-emerald-100 rounded-3xl text-xs text-emerald-700 flex items-start gap-3">
                        <i class="fas fa-database mt-0.5"></i>
                        <div>
                            <strong>Data tersimpan di IndexedDB</strong><br>
                            Kapasitas besar • Aman • Offline
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }

        function renderCatalogProducts(container) {
            const cat = catalogs.find(c => c.id === currentCatalogId);
            const catProducts = products.filter(p => p.catalogId === currentCatalogId);

            let html = `
                <div class="flex items-center justify-between mb-4 px-1">
                    <div class="flex items-center gap-3">
                        <button onclick="goToHome()" 
                                class="w-10 h-10 bg-pink-100 hover:bg-pink-200 active:bg-pink-300 rounded-2xl flex items-center justify-center text-pink-600 transition-colors">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <div>
                            <h2 class="text-2xl font-extrabold text-gray-800">${cat ? cat.name : ''}</h2>
                            <p class="text-sm text-pink-500">${catProducts.length} produk</p>
                        </div>
                    </div>
                    
                    ${isAdminMode ? `
                        <div class="flex gap-2">
                            <button onclick="confirmDeleteAllProducts()" 
                                    class="flex items-center gap-2 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-2xl text-sm font-bold shadow-lg active:scale-95">
                                <i class="fas fa-trash"></i>
                                <span class="hidden sm:inline">Hapus Semua</span>
                            </button>
                            
                            <button onclick="showAddProductModal()" 
                                    class="flex items-center gap-2 bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-2xl text-sm font-bold shadow-lg active:scale-95">
                                <i class="fas fa-plus"></i>
                                <span class="hidden sm:inline">Tambah</span>
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;

            if (catProducts.length === 0) {
                html += `
                    <div class="text-center py-16">
                        <div class="w-16 h-16 mx-auto bg-pink-100 rounded-full flex items-center justify-center mb-4">
                            <i class="fas fa-birthday-cake text-pink-300 text-3xl"></i>
                        </div>
                        <p class="text-gray-400">Belum ada produk di kategori ini</p>
                        ${isAdminMode ? `<button onclick="showAddProductModal()" class="mt-4 text-pink-500 text-sm font-bold">+ Tambah Produk Pertama</button>` : ''}
                    </div>
                `;
            } else {
                html += `<div class="grid grid-cols-2 gap-3">`;
                
                catProducts.forEach(prod => {
                    html += `
                        <div onclick="showProductDetail('${prod.id}')" 
                             class="product-card bg-white border border-pink-100 rounded-3xl overflow-hidden cursor-pointer group">
                            <div class="relative">
                                <img src="${prod.image}" class="w-full object-contain max-h-[240px] bg-pink-50 rounded-t-3xl" 
                                     onerror="this.src='https://picsum.photos/id/292/600/600'">
                                
                                ${isAdminMode ? `

                                        <button onclick="event.stopImmediatePropagation(); showEditProductModal('${prod.id}')"

                                            <i class="fas fa-edit text-xs"></i>

                                        <button onclick="event.stopImmediatePropagation(); confirmDeleteProduct('${prod.id}')" 
                                                class="w-8 h-8 bg-white/90 backdrop-blur rounded-xl flex items-center justify-center text-red-500 shadow">
                                            <i class="fas fa-trash text-xs"></i>
                                        </button>
                                    </div>
                                ` : ''}
                            </div>
                            
                            <div class="p-3.5">
                                <div class="font-bold text-sm text-gray-800 line-clamp-2 leading-tight">${prod.name}</div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            container.innerHTML = html;
        }

        function renderSearchResults(container) {
            const q = searchQuery.toLowerCase().trim();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(q) || 
                (p.keywords && p.keywords.some(k => k.toLowerCase().includes(q)))
            );

            let html = `
                <div class="mb-4 px-1">
                    <div class="flex items-center justify-between">
                        <div>
                            <span class="text-sm text-gray-500">Hasil pencarian untuk</span>
                            <span class="font-bold text-pink-600">"${searchQuery}"</span>
                        </div>
                        <span class="text-xs bg-pink-100 text-pink-600 px-3 py-1 rounded-full font-bold">${filtered.length} ditemukan</span>
                    </div>
                </div>
            `;
            
            if (filtered.length === 0) {
                html += `
                    <div class="text-center py-12">
                        <i class="fas fa-search text-4xl text-pink-200 mb-4"></i>
                        <p class="text-gray-400">Tidak ada produk yang cocok</p>
                    </div>
                `;
            } else {
                html += `<div class="grid grid-cols-2 gap-3">`;
                
                filtered.forEach(prod => {
                    const cat = catalogs.find(c => c.id === prod.catalogId);
                    html += `
                        <div onclick="showProductDetail('${prod.id}')" 
                             class="product-card bg-white border border-pink-100 rounded-3xl overflow-hidden cursor-pointer">

        // ==================== BULK UPLOAD + PARSER ====================
        function parseFileName(fileName) {
            // Hilangkan ekstensi
            let nameWithoutExt = fileName.replace(/\.[^/.]+$/, "").trim();
            
            // Pisahkan berdasarkan _# atau _ #
            let parts = nameWithoutExt.split(/_ *#/);
            
            let productName = parts[0].trim();
            
            // Title Case otomatis
            productName = productName
                .toLowerCase()
                .split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
            
            let keywords = [];
            if (parts.length > 1) {
                // Ambil semua kata yang diawali #
                const keywordPart = parts.slice(1).join(' ');
                keywords = keywordPart
                    .split(/ +#/)
                    .map(k => k.replace(/^#/, '').trim())
                    .filter(k => k.length > 0);
            }
            
            return {
                productName: productName,
                keywords: keywords
            };
        }

        let bulkFilesData = [];

        async function processBulkFiles() {
            const modal = document.querySelector('.fixed.z-\\[80\\]');
            const fileInput = modal.querySelector('#bulk-files');
            const files = Array.from(fileInput.files);
            
            if (files.length === 0) return;
            
            bulkFilesData = [];
            
            // Sembunyikan step 1, tampilkan step 2
            modal.querySelector('#bulk-step-1').classList.add('hidden');
            modal.querySelector('#bulk-step-2').classList.remove('hidden');
            modal.querySelector('#bulk-process-btn').classList.add('hidden');
            modal.querySelector('#bulk-save-btn').classList.remove('hidden');
            
            const previewContainer = modal.querySelector('#bulk-preview-list');
            previewContainer.innerHTML = '';
            
            // Progress bar
            const progressContainer = modal.querySelector('#bulk-progress-container');
            const progressBar = modal.querySelector('#bulk-progress-bar');
            const progressText = modal.querySelector('#bulk-progress-text');
            progressContainer.classList.remove('hidden');
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const progress = Math.round(((i + 1) / files.length) * 100);
                
                progressBar.style.width = progress + '%';
                progressText.textContent = progress + '%';
                
                // Parse nama file
                const parsed = parseFileName(file.name);
                
                // Convert ke base64
                const base64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
                
                const item = {
                    id: 'bulk_' + Date.now() + '_' + i,
                    fileName: file.name,
                    productName: parsed.productName,
                    keywords: parsed.keywords,
                    imageBase64: base64,
                    selected: true
                };
                
                bulkFilesData.push(item);
                
                // Render preview card
                const card = document.createElement('div');
                card.className = `border rounded-2xl p-4 flex gap-4 bg-white bulk-item ${item.selected ? 'border-pink-300' : 'border-gray-200 opacity-60'}`;
                card.innerHTML = `
                    <div class="w-24 h-24 flex-shrink-0">
                        <img src="${base64}" class="w-full h-full object-cover rounded-xl border">
                    </div>
                    <div class="flex-1 min-w-0 space-y-3">
                        <div>
                            <label class="text-xs font-bold text-gray-500">NAMA PRODUK</label>
                            <input type="text" value="${item.productName}" 
                                   class="w-full border border-pink-200 rounded-xl px-3 py-2 text-sm font-medium bulk-name-input">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500">KEYWORDS</label>
                            <input type="text" value="${item.keywords.join(', ')}" 
                                   class="w-full border border-pink-200 rounded-xl px-3 py-2 text-sm bulk-keyword-input"
                                   placeholder="pisahkan dengan koma">
                        </div>
                        <div class="flex items-center justify-between">
                            <label class="flex items-center gap-2 text-sm cursor-pointer">
                                <input type="checkbox" ${item.selected ? 'checked' : ''} class="bulk-select-checkbox accent-pink-500">
                                <span class="text-xs text-gray-600">Simpan</span>
                            </label>
                            <button onclick="removeBulkItem('${item.id}', this)" class="text-red-400 hover:text-red-500 text-xs flex items-center gap-1">
                                <i class="fas fa-trash"></i> <span class="hidden sm:inline">Hapus</span>
                            </button>
                        </div>
                    </div>
                `;
                
                // Event listeners untuk update data
                const nameInput = card.querySelector('.bulk-name-input');
                const keywordInput = card.querySelector('.bulk-keyword-input');
                const checkbox = card.querySelector('.bulk-select-checkbox');
                
                nameInput.oninput = () => {
                    item.productName = nameInput.value;
                };
                
                keywordInput.oninput = () => {
                    item.keywords = keywordInput.value.split(',').map(k => k.trim()).filter(Boolean);
                };
                
                checkbox.onchange = () => {
                    item.selected = checkbox.checked;
                    if (checkbox.checked) {
                        card.classList.remove('opacity-60', 'border-gray-200');
                        card.classList.add('border-pink-300');
                    } else {
                        card.classList.add('opacity-60', 'border-gray-200');
                        card.classList.remove('border-pink-300');
                    }
                };
                
                previewContainer.appendChild(card);
            }
            
            // Update count
            modal.querySelector('#bulk-count').textContent = `${files.length} gambar`;
            
            // Sembunyikan progress setelah selesai
            setTimeout(() => {
                progressContainer.classList.add('hidden');
            }, 800);
        }

        function selectAllBulk(select) {
            const modal = document.querySelector('.fixed.z-\\[80\\]');
            const checkboxes = modal.querySelectorAll('.bulk-select-checkbox');
            const cards = modal.querySelectorAll('.bulk-item');
            
            checkboxes.forEach((cb, index) => {
                cb.checked = select;
                bulkFilesData[index].selected = select;
                
                if (select) {
                    cards[index].classList.remove('opacity-60', 'border-gray-200');
                    cards[index].classList.add('border-pink-300');
                } else {
                    cards[index].classList.add('opacity-60', 'border-gray-200');
                    cards[index].classList.remove('border-pink-300');
                }
            });
        }

        function removeBulkItem(id, btn) {
            bulkFilesData = bulkFilesData.filter(item => item.id !== id);
            btn.closest('.bulk-item').remove();
            
            const modal = document.querySelector('.fixed.z-\\[80\\]');
            modal.querySelector('#bulk-count').textContent = `${bulkFilesData.length} gambar`;
            
            if (bulkFilesData.length === 0) {
                modal.querySelector('#bulk-save-btn').classList.add('hidden');
            }
        }

        async function saveBulkProducts(btn) {
            const selectedItems = bulkFilesData.filter(item => item.selected);
            
            if (selectedItems.length === 0) {
                alert('Tidak ada produk yang dipilih untuk disimpan.');
                return;
            }
            
            const modal = btn.closest('.fixed');
            const progressContainer = modal.querySelector('#bulk-progress-container');
            const progressBar = modal.querySelector('#bulk-progress-bar');
            const progressText = modal.querySelector('#bulk-progress-text');
            
            progressContainer.classList.remove('hidden');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>Menyimpan...</span>`;
            
            let savedCount = 0;
            
            for (let i = 0; i < selectedItems.length; i++) {
                const item = selectedItems[i];
                const progress = Math.round(((i + 1) / selectedItems.length) * 100);
                
                progressBar.style.width = progress + '%';
                progressText.textContent = progress + '%';
                
                const newProduct = {
                    id: 'p' + Date.now() + '_' + i,
                    catalogId: currentCatalogId,
                    name: item.productName,
                    image: item.imageBase64,
                    keywords: item.keywords.length > 0 ? item.keywords : ['produk']
                };
                
                await addProduct(newProduct);
                savedCount++;
                
                // Small delay agar progress terlihat
                await new Promise(r => setTimeout(r, 80));
            }
            
            modal.remove();
            showToast(`${savedCount} produk berhasil ditambahkan ke kategori!`);
            
            // Refresh tampilan
            render();
        }

        // ==================== IMAGE PREVIEW LIGHTBOX (Zoom + Download) ====================
        function showImagePreview(imageSrc, productName) {
            let scale = 1;
            const lightbox = document.createElement('div');
            lightbox.className = 'fixed inset-0 bg-black/90 flex items-center justify-center z-[90]';
            lightbox.innerHTML = `
                <div class="relative w-full h-full flex flex-col">
                    <!-- Top Bar -->
                    <div class="absolute top-0 left-0 right-0 z-10 flex items-center justify-between p-4 bg-gradient-to-b from-black/70 to-transparent">
                        <div class="text-white">
                            <div class="font-bold text-lg">${productName || 'Preview Gambar'}</div>
                            <div class="text-xs text-white/70">Ketuk gambar untuk zoom • Geser untuk melihat</div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button id="zoom-out" class="w-10 h-10 bg-white/10 hover:bg-white/20 active:bg-white/30 backdrop-blur rounded-full flex items-center justify-center text-white transition-colors">
                                <i class="fas fa-search-minus text-lg"></i>
                            </button>
                            <button id="zoom-in" class="w-10 h-10 bg-white/10 hover:bg-white/20 active:bg-white/30 backdrop-blur rounded-full flex items-center justify-center text-white transition-colors">
                                <i class="fas fa-search-plus text-lg"></i>
                            </button>
                            <button id="download-btn" class="flex items-center gap-2 px-4 h-10 bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 rounded-full text-white text-sm font-bold transition-colors">
                                <i class="fas fa-download"></i>
                                <span class="hidden sm:inline">Download</span>
                            </button>
                            <button id="close-lightbox" class="w-10 h-10 bg-white/10 hover:bg-white/20 active:bg-white/30 backdrop-blur rounded-full flex items-center justify-center text-white transition-colors">
                                <i class="fas fa-times text-xl"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Image Container -->
                    <div class="flex-1 flex items-center justify-center overflow-hidden p-4 pt-20" style="touch-action: none;">
                        <img id="lightbox-img" src="${imageSrc}" 
                             class="max-w-[95%] max-h-[80vh] object-contain rounded-2xl shadow-2xl cursor-grab active:cursor-grabbing transition-transform duration-100 select-none"
                             style="transform: scale(1);"
                             onerror="this.src='https://picsum.photos/id/292/800/800'">
                    </div>

                    <!-- Bottom hint -->
                    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white/50 text-xs flex items-center gap-2">
                        <i class="fas fa-hand-paper"></i>
                        <span>Drag untuk menggeser • +/- untuk zoom</span>
                    </div>
                </div>
            `;
            document.body.appendChild(lightbox);

            const img = lightbox.querySelector('#lightbox-img');
            const zoomInBtn = lightbox.querySelector('#zoom-in');
            const zoomOutBtn = lightbox.querySelector('#zoom-out');
            const downloadBtn = lightbox.querySelector('#download-btn');
            const closeBtn = lightbox.querySelector('#close-lightbox');

            // Zoom functions
            function updateZoom() {
                img.style.transform = `scale(${scale})`;
            }

            zoomInBtn.onclick = () => {
                scale = Math.min(scale + 0.25, 4);
                updateZoom();
            };

            zoomOutBtn.onclick = () => {
                scale = Math.max(scale - 0.25, 0.5);
                updateZoom();
            };

            // Mouse wheel zoom
            img.onwheel = (e) => {
                e.preventDefault();
                if (e.deltaY < 0) {
                    scale = Math.min(scale + 0.2, 4);
                } else {
                    scale = Math.max(scale - 0.2, 0.5);
                }
                updateZoom();
            };

            // Drag to pan (simple implementation)
            let isDragging = false;
            let startX = 0, startY = 0, currentX = 0, currentY = 0;

            img.onmousedown = (e) => {
                isDragging = true;
                startX = e.clientX - currentX;
                startY = e.clientY - currentY;
                img.style.cursor = 'grabbing';
            };

            document.onmousemove = (e) => {
                if (!isDragging) return;
                currentX = e.clientX - startX;
                currentY = e.clientY - startY;
                img.style.transform = `translate(${currentX}px, ${currentY}px) scale(${scale})`;
            };

            document.onmouseup = () => {
                isDragging = false;
                img.style.cursor = 'grab';
            };

            // Touch support for mobile
            let touchStartX = 0, touchStartY = 0;
            img.ontouchstart = (e) => {
                if (e.touches.length === 1) {
                    isDragging = true;
                    touchStartX = e.touches[0].clientX - currentX;
                    touchStartY = e.touches[0].clientY - currentY;
                }
            };
            img.ontouchmove = (e) => {
                if (!isDragging || e.touches.length !== 1) return;
                currentX = e.touches[0].clientX - touchStartX;
                currentY = e.touches[0].clientY - touchStartY;
                img.style.transform = `translate(${currentX}px, ${currentY}px) scale(${scale})`;
            };
            img.ontouchend = () => { isDragging = false; };

            // Download
            downloadBtn.onclick = () => {
                const link = document.createElement('a');
                link.href = imageSrc;
                const safeName = (productName || 'produk').replace(/[^a-z0-9]/gi, '_').toLowerCase();
                link.download = `${safeName}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Close handlers
            closeBtn.onclick = () => lightbox.remove();
            lightbox.onclick = (e) => {
                if (e.target === lightbox) lightbox.remove();
            };

            // Keyboard support
            const keyHandler = (e) => {
                if (e.key === 'Escape') {
                    lightbox.remove();
                    document.removeEventListener('keydown', keyHandler);
                }
                if (e.key === '+' || e.key === '=') {
                    scale = Math.min(scale + 0.25, 4);
                    updateZoom();
                }
                if (e.key === '-') {
                    scale = Math.max(scale - 0.25, 0.5);
                    updateZoom();
                }
            };
            document.addEventListener('keydown', keyHandler);

            // Clean up on remove
            lightbox.addEventListener('remove', () => {
                document.removeEventListener('keydown', keyHandler);
            }, { once: true });
        }

            // 3 kali klik logo = masuk admin (cara baru yang lebih simpel)
            if (headerClickCount >= 3) {
                headerClickCount = 0;

                if (!isAdminMode) {
                    showAdminLoginModal(); // pakai modal cantik
                } else {
                    if (confirm('Nonaktifkan mode admin?')) {
                        isAdminMode = false;
                        const badge = document.getElementById('admin-badge');
                        badge.classList.add('hidden');
                        badge.classList.remove('flex');
                        render();
                    }
                }
            }
        }

        // ==================== EXPORT / IMPORT ====================
        async function exportData() {
            const data = {
                catalogs: catalogs,
                products: products,
                exportedAt: new Date().toISOString(),
                version: "2.0"
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `sinacake-backup-${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('Data berhasil diexport!');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = async function(ev) {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        
                        if (!imported.catalogs || !imported.products) {
                            throw new Error('Format file tidak valid');
                        }
                        
                        if (confirm(`Import ${imported.catalogs.length} kategori dan ${imported.products.length} produk?\nData lama akan ditimpa.`)) {
                            catalogs = imported.catalogs;
                            products = imported.products;
                            
                            await saveToStore('catalogs', catalogs);
                            await saveToStore('products', products);
                            
                            render();
                            showToast('Data berhasil diimport!');
                        }
                    } catch (err) {
                        alert('Gagal import: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            
            input.click();
        }

        // ==================== INITIALIZE ====================
        async function initialize() {
            await openDB();
            await loadData();
            
            const container = document.getElementById('main-content');
            renderHomeCatalogs(container);
            
            setTimeout(() => {
                if (!localStorage.getItem('sinacake_welcome_shown_v2')) {
                    localStorage.setItem('sinacake_welcome_shown_v2', 'true');
                }
            }, 1500);
            
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === "/") {
                    e.preventDefault();
                    if (!isAdminMode) {
                        const pass = prompt("Password admin:");
                        if (pass === "Admin") {
                            isAdminMode = true;
                            const badge = document.getElementById('admin-badge');
                            badge.classList.remove('hidden');
                            badge.classList.add('flex');
                            render();
                            showToast('Mode Admin aktif via shortcut');
                        }
                    }
                }
            });
            
            console.log('%c[Sinacake] Aplikasi berhasil dimuat dengan IndexedDB + Migration!', 'color:#FF69B4');
        }

        window.onload = initialize;
        
        window.Sinacake = {
            exportData: () => exportData(),
            importData: () => importData(),
            clearAllData: async () => {
                if (confirm('HAPUS SEMUA DATA?')) {
                    await saveToStore('catalogs', []);
                    await saveToStore('products', []);
                    localStorage.clear();
                    location.reload();
                }
            },
            showAdmin: () => {
                isAdminMode = true;
                document.getElementById('admin-badge').classList.remove('hidden');
                document.getElementById('admin-badge').classList.add('flex');
                render();
            }
        };
    </script>
</body>
</html>
